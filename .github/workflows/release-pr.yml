name: Prepare Release PR

permissions:
  contents: write
  pull-requests: write

on:
  pull_request_target:
    types: [closed]
    branches: [master]

concurrency:
  group: release-pr-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  prepare-release-pr:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'release/version-bump-v')

    steps:
      - name: Checkout merged master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Install Rust Tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Bump minor version for release PR
        run: |
          chmod +x ./bin/inc_version.sh
          ./bin/inc_version.sh p

      - name: Read bumped version
        id: version
        run: |
          VERSION=$(grep -Po '^version\s*=\s*"\K[0-9\.]+' ./Cargo.toml)
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/version-bump-v${{ steps.version.outputs.value }}
          base: master
          title: "ci: bump version v${{ steps.version.outputs.value }}"
          commit-message: "ci: bump version v${{ steps.version.outputs.value }}"
          body: |
            Automated release version bump for `master`.

            This PR was created after merging a non-release PR into `master`.

            Version change:
            - minor bump to `${{ steps.version.outputs.value }}`

            Merge this PR to trigger the release build and publication workflow.
          delete-branch: false
